name: Jest CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Jest tests
        run: npm run test
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TMDB_API_KEY: "test-mock-key-not-real"
          TMDB_API_READ_ACCESS_TOKEN: "test-mock-token-not-real"
          TMDB_API_BASE_URL: "http://localhost:3000/api/test/tmdb"
          TEST_MODE: "true"
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: "FAKE_VAPID_PUBLIC_KEY_FOR_TESTING_ONLY_NOT_REAL"
          VAPID_PRIVATE_KEY: "FAKE_VAPID_PRIVATE_KEY_FOR_TESTING_ONLY_NOT_REAL"
          VAPID_SUBJECT: "mailto:test@celluphile.com"
          CRON_SECRET: "test-cron-secret-123"
